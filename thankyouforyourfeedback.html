<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thank you for sending feedback to Carrot Core Creations.">
  <link rel="icon" type="image/png" href="./CCSquare.png">
  <link rel="stylesheet" href="./styles.css?v=20260504-hero-actions-grid">
  <title>Thank You</title>
</head>
<body class="policy-page">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-actions">
        <a class="button" href="./index.html">Home</a>
      </div>
      <div class="brandline">Feedback</div>
    </header>

    <main>
      <section class="card">
        <h1>Thank you for your submission!</h1>
        <p>Your response has been received.</p>
      </section>
    </main>

    <footer class="footer">
      <span class="company-mark">
        <img src="./CCSquare.png" alt="Carrot Core Creations logo">
        <span>Carrot Core Creations 2026</span>
      </span>
    </footer>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)");

      function applySystemTheme() {
        root.setAttribute("data-theme", systemTheme.matches ? "dark" : "light");
      }

      applySystemTheme();

      systemTheme.addEventListener("change", applySystemTheme);
    }());
  </script>
</body>
</html>
