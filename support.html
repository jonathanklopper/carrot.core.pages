<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Send support requests, bug reports, feature ideas, and feedback for Carrot Core Creations apps.">
  <link rel="icon" type="image/png" href="./CCSquare.png">
  <link rel="stylesheet" href="./styles.css?v=20260504-hero-actions-grid">
  <title>Feedback</title>
</head>
<body class="site-page">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-actions">
        <a class="button button-secondary" href="./index.html">Back</a>
      </div>
      <div class="brandline">Support</div>
    </header>

    <main>
      <section id="support" class="support-section">
        <h2>Feedback</h2>
        <p>
          Send any app feedback or questions about the privacy policy.
        </p>

        <div class="support-frame">
          <iframe
            data-tally-src="https://tally.so/embed/vGqN1D?alignLeft=1&amp;hideTitle=1&amp;dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="500"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            scrolling="no"
            style="background-color: #1a1917;"
            title="Support &amp; Feedback">
          </iframe>
        </div>

        <script>

          var d=document,w="https://tally.so/widgets/embed.js",v=function(){
            d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){
              var src = e.dataset.tallySrc;
              var pageParams = new URLSearchParams(window.location.search);
              var app = pageParams.get("app");
              var from = pageParams.get("from");

              if(app || from){
                var tallyUrl = new URL(src);
                if(app){tallyUrl.searchParams.set("app", app);}
                if(from){tallyUrl.searchParams.set("from", from);}
                e.dataset.tallySrc = tallyUrl.toString();
              }
            });

            if(typeof Tally!=="undefined"){Tally.loadEmbeds();}
            else{d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){
              e.src=e.dataset.tallySrc;
            });}
          };
          if(typeof Tally!=="undefined")v();
          else if(d.querySelector('script[src="'+w+'"]')==null){
            var s=d.createElement("script");
            s.src=w;
            s.onload=v;
            s.onerror=v;
            d.body.appendChild(s);
          }
        </script>
      </section>
    </main>

    <footer class="footer">
      <span class="company-mark">
        <img src="./CCSquare.png" alt="Carrot Core Creations logo">
        <span>Carrot Core Creations 2026</span>
      </span>
    </footer>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)");

      function applySystemTheme() {
        root.setAttribute("data-theme", systemTheme.matches ? "dark" : "light");
      }

      applySystemTheme();

      systemTheme.addEventListener("change", applySystemTheme);
    }());
  </script>
</body>
</html>
