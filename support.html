<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Send support requests, bug reports, feature ideas, and feedback for Carrot Core Creations apps.">
  <link rel="icon" type="image/png" href="./CCSquare.png">
  <link rel="stylesheet" href="./styles.css?v=20260503-footer-center">
  <title>Support &amp; Feedback</title>
</head>
<body class="site-page">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-actions">
        <a class="button button-secondary" href="./index.html">Back</a>
      </div>
      <div class="brandline">Support</div>
    </header>

    <main>
      <section id="support" class="support-section">
        <h2>Support &amp; Feedback</h2>
        <p>
          Send app feedback, bug reports, feature requests, or support questions.
        </p>

        <div class="support-frame">
            <iframe
            id="tally-support-form"
            loading="lazy"
            width="100%"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            style="background-color: #1a1917;"
            title="Support &amp; Feedback">
          </iframe>
        </div>

        <script>

          (function () {
            const pageParams = new URLSearchParams(window.location.search);
            const app = pageParams.get("app") || "";
            const tallyUrl = new URL("https://tally.so/embed/vGqN1D");

            tallyUrl.searchParams.set("alignLeft", "1");
            tallyUrl.searchParams.set("hideTitle", "1");
            tallyUrl.searchParams.set("dynamicHeight", "1");

            if (app) {
              tallyUrl.searchParams.set("app", app);
            }

            const iframe = document.getElementById("tally-support-form");
            iframe.src = tallyUrl.toString();
            console.log("Tally iframe URL:", iframe.src);
          }());

        </script>
      </section>
    </main>

    <footer class="footer">
      <span class="company-mark">
        <img src="./CCSquare.png" alt="Carrot Core Creations logo">
        <span>Carrot Core Creations 2026</span>
      </span>
    </footer>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)");

      function applySystemTheme() {
        root.setAttribute("data-theme", systemTheme.matches ? "dark" : "light");
      }

      applySystemTheme();

      systemTheme.addEventListener("change", applySystemTheme);
    }());
  </script>
</body>
</html>
